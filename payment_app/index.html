<!DOCTYPE html>
<html class="dark" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEON BANK | Secure Payment</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-surface": "#e8e0f0",
              "on-background": "#e8e0f0",
              "surface-container-low": "#111118",
              "outline-variant": "#302840",
              "outline": "#5a5068",
              "on-error-container": "#ffa0a0",
              "on-primary": "#1a0010",
              "primary-container": "#b3004e",
              "inverse-on-surface": "#0a0a12",
              "surface-dim": "#0f0f1a",
              "secondary": "#00ffcc",
              "surface-container-lowest": "#0a0a12",
              "surface-tint": "#ff2d78",
              "tertiary-container": "#665200",
              "secondary-container": "#004d3d",
              "error-container": "#3d0f0f",
              "error": "#ff4444",
              "on-secondary": "#001a1a",
              "surface-bright": "#1a1a2e",
              "on-tertiary": "#1a1000",
              "surface-container-high": "#1e1e30",
              "on-surface-variant": "#a098b0",
              "surface-variant": "#1e1e30",
              "surface-container": "#141422",
              "primary-fixed": "#ffe0ec",
              "on-secondary-container": "#c0fff4",
              "surface-container-highest": "#28283e",
              "surface": "#0f0f1a",
              "tertiary": "#ffe04a",
              "on-tertiary-container": "#fff0c0",
              "secondary-fixed-dim": "#00e6b8",
              "secondary-fixed": "#c0fff4",
              "tertiary-fixed": "#fff0c0",
              "on-primary-container": "#ffe0ec",
              "inverse-surface": "#e8e0f0",
              "background": "#0a0a12",
              "primary": "#ff2d78",
              "primary-fixed-dim": "#ff80aa",
            },
            fontFamily: {
              headline: ["Sora"],
              display: ["Sora"],
              body: ["Inter"],
              label: ["Space Grotesk"],
            }
          }
        }
      }
    </script>
    <style>
      * { box-sizing: border-box; }
      body {
        background-color: #0a0a12;
        color: #e8e0f0;
        font-family: 'Inter', sans-serif;
        background-image:
          radial-gradient(circle at 50% 50%, rgba(255, 45, 120, 0.05) 0%, transparent 50%),
          linear-gradient(rgba(30, 30, 48, 0.2) 1px, transparent 1px),
          linear-gradient(90deg, rgba(30, 30, 48, 0.2) 1px, transparent 1px);
        background-size: 100% 100%, 40px 40px, 40px 40px;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        display: inline-block;
        vertical-align: middle;
      }
      .neon-glow-text { text-shadow: 0 0 8px currentColor; }
      .neon-border { border: 1px solid rgba(255, 45, 120, 0.3); box-shadow: inset 0 0 12px rgba(255, 45, 120, 0.05); }
      .neon-border-cyan { border: 1px solid rgba(0, 255, 204, 0.3); box-shadow: inset 0 0 12px rgba(0, 255, 204, 0.05); }
      .neon-glow-pink { box-shadow: 0 0 16px rgba(255, 45, 120, 0.5); }
      .neon-glow-cyan { box-shadow: 0 0 16px rgba(0, 255, 204, 0.4); }
      .slide-up { animation: slideUp 0.3s ease-out; }
      @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
      .pulse-cyan { animation: pulseCyan 2s infinite; }
      @keyframes pulseCyan { 0%,100% { box-shadow: 0 0 0 0 rgba(0,255,204,0.4); } 50% { box-shadow: 0 0 0 6px rgba(0,255,204,0); } }
    </style>
  </head>
  <body class="min-h-screen overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
