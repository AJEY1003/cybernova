<!DOCTYPE html>
<html class="dark" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEON BANK | Secure Payment</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-surface": "var(--c-on-surface)",
              "on-background": "var(--c-on-background)",
              "surface-container-low": "var(--c-surface-container-low)",
              "outline-variant": "var(--c-outline-variant)",
              "outline": "var(--c-outline)",
              "on-error-container": "var(--c-on-error-container)",
              "on-primary": "var(--c-on-primary)",
              "primary-container": "var(--c-primary-container)",
              "inverse-on-surface": "var(--c-inverse-on-surface)",
              "surface-dim": "var(--c-surface-dim)",
              "secondary": "var(--c-secondary)",
              "surface-container-lowest": "var(--c-surface-container-lowest)",
              "surface-tint": "var(--c-surface-tint)",
              "tertiary-container": "var(--c-tertiary-container)",
              "secondary-container": "var(--c-secondary-container)",
              "error-container": "var(--c-error-container)",
              "error": "var(--c-error)",
              "on-secondary": "var(--c-on-secondary)",
              "surface-bright": "var(--c-surface-bright)",
              "on-tertiary": "var(--c-on-tertiary)",
              "surface-container-high": "var(--c-surface-container-high)",
              "on-surface-variant": "var(--c-on-surface-variant)",
              "surface-variant": "var(--c-surface-variant)",
              "surface-container": "var(--c-surface-container)",
              "primary-fixed": "var(--c-primary-fixed)",
              "on-secondary-container": "var(--c-on-secondary-container)",
              "surface-container-highest": "var(--c-surface-container-highest)",
              "surface": "var(--c-surface)",
              "tertiary": "var(--c-tertiary)",
              "on-tertiary-container": "var(--c-on-tertiary-container)",
              "secondary-fixed-dim": "var(--c-secondary-fixed-dim)",
              "secondary-fixed": "var(--c-secondary-fixed)",
              "tertiary-fixed": "var(--c-tertiary-fixed)",
              "on-primary-container": "var(--c-on-primary-container)",
              "inverse-surface": "var(--c-inverse-surface)",
              "background": "var(--c-background)",
              "primary": "var(--c-primary)",
              "primary-fixed-dim": "var(--c-primary-fixed-dim)",
            },
            fontFamily: {
              headline: ["Sora"],
              display: ["Sora"],
              body: ["Inter"],
              label: ["Space Grotesk"],
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --c-on-surface: #1a1a2e;
        --c-on-background: #1a1a2e;
        --c-surface-container-low: #f1f3f9;
        --c-outline-variant: #cbd2e0;
        --c-outline: #a098b0;
        --c-on-error-container: #410002;
        --c-on-primary: #ffffff;
        --c-primary-container: #ffd9e2;
        --c-inverse-on-surface: #f2ebf4;
        --c-surface-dim: #d8d2d8;
        --c-secondary: #006b56;
        --c-surface-container-lowest: #ffffff;
        --c-surface-tint: #b3004e;
        --c-tertiary-container: #ffe04a;
        --c-secondary-container: #c0fff4;
        --c-error-container: #ffdad6;
        --c-error: #ba1a1a;
        --c-on-secondary: #ffffff;
        --c-surface-bright: #f9f9ff;
        --c-on-tertiary: #ffffff;
        --c-surface-container-high: #ece6ed;
        --c-on-surface-variant: #49454f;
        --c-surface-variant: #e7e0ec;
        --c-surface-container: #f3edf3;
        --c-primary-fixed: #ffe0ec;
        --c-on-secondary-container: #002019;
        --c-surface-container-highest: #e6e0e6;
        --c-surface: #fffbff;
        --c-tertiary: #665200;
        --c-on-tertiary-container: #1a1000;
        --c-secondary-fixed-dim: #00e6b8;
        --c-secondary-fixed: #c0fff4;
        --c-tertiary-fixed: #fff0c0;
        --c-on-primary-container: #3e0017;
        --c-inverse-surface: #313033;
        --c-background: #f8f9fc;
        --c-primary: #d60051;
        --c-primary-fixed-dim: #ff80aa;
      }

      .dark {
        --c-on-surface: #e8e0f0;
        --c-on-background: #e8e0f0;
        --c-surface-container-low: #111118;
        --c-outline-variant: #302840;
        --c-outline: #5a5068;
        --c-on-error-container: #ffa0a0;
        --c-on-primary: #1a0010;
        --c-primary-container: #b3004e;
        --c-inverse-on-surface: #0a0a12;
        --c-surface-dim: #0f0f1a;
        --c-secondary: #00ffcc;
        --c-surface-container-lowest: #0a0a12;
        --c-surface-tint: #ff2d78;
        --c-tertiary-container: #665200;
        --c-secondary-container: #004d3d;
        --c-error-container: #3d0f0f;
        --c-error: #ff4444;
        --c-on-secondary: #001a1a;
        --c-surface-bright: #1a1a2e;
        --c-on-tertiary: #1a1000;
        --c-surface-container-high: #1e1e30;
        --c-on-surface-variant: #a098b0;
        --c-surface-variant: #1e1e30;
        --c-surface-container: #141422;
        --c-primary-fixed: #ffe0ec;
        --c-on-secondary-container: #c0fff4;
        --c-surface-container-highest: #28283e;
        --c-surface: #0f0f1a;
        --c-tertiary: #ffe04a;
        --c-on-tertiary-container: #fff0c0;
        --c-secondary-fixed-dim: #00e6b8;
        --c-secondary-fixed: #c0fff4;
        --c-tertiary-fixed: #fff0c0;
        --c-on-primary-container: #ffe0ec;
        --c-inverse-surface: #e8e0f0;
        --c-background: #0a0a12;
        --c-primary: #ff2d78;
        --c-primary-fixed-dim: #ff80aa;
      }

      * { box-sizing: border-box; }
      body {
        background-color: var(--c-background);
        color: var(--c-on-background);
        font-family: 'Inter', sans-serif;
        background-image:
          radial-gradient(circle at 50% 50%, rgba(255, 45, 120, 0.05) 0%, transparent 50%),
          linear-gradient(rgba(30, 30, 48, 0.1) 1px, transparent 1px),
          linear-gradient(90deg, rgba(30, 30, 48, 0.1) 1px, transparent 1px);
        background-size: 100% 100%, 40px 40px, 40px 40px;
        transition: background-color 0.3s, color 0.3s;
      }
      .dark body {
        background-image:
          radial-gradient(circle at 50% 50%, rgba(255, 45, 120, 0.05) 0%, transparent 50%),
          linear-gradient(rgba(30, 30, 48, 0.2) 1px, transparent 1px),
          linear-gradient(90deg, rgba(30, 30, 48, 0.2) 1px, transparent 1px);
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        display: inline-block;
        vertical-align: middle;
      }
      .neon-glow-text { text-shadow: 0 0 8px currentColor; }
      .neon-border { border: 1px solid rgba(255, 45, 120, 0.3); box-shadow: inset 0 0 12px rgba(255, 45, 120, 0.05); }
      .neon-border-cyan { border: 1px solid rgba(0, 255, 204, 0.3); box-shadow: inset 0 0 12px rgba(0, 255, 204, 0.05); }
      .neon-glow-pink { box-shadow: 0 0 16px rgba(255, 45, 120, 0.5); }
      .neon-glow-cyan { box-shadow: 0 0 16px rgba(0, 255, 204, 0.4); }
      .slide-up { animation: slideUp 0.3s ease-out; }
      @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
      .pulse-cyan { animation: pulseCyan 2s infinite; }
      @keyframes pulseCyan { 0%,100% { box-shadow: 0 0 0 0 rgba(0,255,204,0.4); } 50% { box-shadow: 0 0 0 6px rgba(0,255,204,0); } }
    </style>
  </head>
  <body class="min-h-screen overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
